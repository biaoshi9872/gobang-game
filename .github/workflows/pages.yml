name: Deploy static site to server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "server-deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload site files
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -rf /tmp/gobang-deploy && mkdir -p /tmp/gobang-deploy"
          scp index.html style.css script.js \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/gobang-deploy/"

      - name: Publish site
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -rf /usr/share/nginx/html/* && \
             cp -f /tmp/gobang-deploy/* /usr/share/nginx/html/ && \
             nginx -t && \
             systemctl reload nginx"
