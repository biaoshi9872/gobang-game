name: Deploy static site to server

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "server-deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known_hosts
        run: |
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload site files
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -rf /tmp/gobang-deploy && mkdir -p /tmp/gobang-deploy"
          scp -i ~/.ssh/deploy_key index.html style.css script.js \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/gobang-deploy/"

      - name: Publish site
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -rf /usr/share/nginx/html/* && \
             cp -f /tmp/gobang-deploy/* /usr/share/nginx/html/ && \
             nginx -t && \
             systemctl reload nginx"
